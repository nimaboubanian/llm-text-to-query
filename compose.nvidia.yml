# GPU override for NVIDIA GPUs.
# Usage: docker compose -f compose.yml -f compose.nvidia.yml up -d
#
# Prerequisite: NVIDIA Container Toolkit
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
