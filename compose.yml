x-common-env: &common-env
  PYTHONPATH: /app/src
  DATABASE_URL: postgresql://user:password@postgres:5432/testdb
  UV_PROJECT_ENVIRONMENT: /tmp/.venv

x-model-env: &model-env
  DEFAULT_MODEL: qwen2.5-coder:7b
  # BENCHMARK_MODELS: "llama3.2:3b,qwen2.5-coder:7b,deepseek-coder:6.7b"

services:
  ollama:
    image: ollama/ollama:0.5.7
    container_name: ollama
    networks:
      - app-network
    volumes:
      - ollama_data:/root/.ollama
      - ./app/ollama-entrypoint.sh:/entrypoint.sh:ro,Z
    environment:
      <<: *model-env
    entrypoint: [ "/entrypoint.sh" ]
    restart: always
    healthcheck:
      test: [ "CMD", "sh", "-c", "ollama show \"$$DEFAULT_MODEL\" > /dev/null 2>&1" ]
      start_period: 600s
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - app-network
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro,Z
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d testdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: app
    networks:
      - app-network
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://user:password@postgres:5432/minidb
    restart: unless-stopped
    command: ["sleep", "infinity"]

  orchestrator:
    build: ./app
    container_name: orchestrator
    networks:
      - app-network
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: [*common-env, *model-env]
      PYTHONUNBUFFERED: "1"
      BENCHMARK_NUM_SEEDS: "5"
    volumes:
      - ./benchmark:/app/benchmark:Z
    restart: "no"
    profiles:
      - benchmark
    command: [ "uv", "run", "benchmark-orchestrator" ]

volumes:
  ollama_data:
    name: llm_ollama_data
  pg_data:
    name: llm_pg_data

networks:
  app-network:
    driver: bridge
